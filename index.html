<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Scientific calculator with basic and advanced modes."
    />
    <title>AdvCalculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main id="calc" aria-label="Calculator">
      <header class="top-bar" aria-label="Display and mode controls">
        <div class="display-wrap">
          <input
            id="display"
            type="text"
            inputmode="decimal"
            readonly
            autocomplete="off"
            spellcheck="false"
            aria-label="Expression and result"
          />
          <div id="mode-hint" class="mode-hint" aria-live="polite"></div>
        </div>

        <div class="top-actions">
          <button type="button" class="modeBtn deg-btn" id="btn-deg" data-action="toggleDeg">
            Rad
          </button>
        </div>
      </header>

      <div id="keys" class="keys">
        <div id="scientific-keys" class="keys-grid scientific" role="group" aria-label="Scientific functions">
          <button type="button" class="fnBtn" data-append="sin(">sin</button>
          <button type="button" class="fnBtn" data-append="cos(">cos</button>
          <button type="button" class="fnBtn" data-append="tan(">tan</button>
          <button type="button" class="operatorBtn" data-append="^">^</button>

          <button type="button" class="fnBtn" data-append="asin(">asin</button>
          <button type="button" class="fnBtn" data-append="acos(">acos</button>
          <button type="button" class="fnBtn" data-append="atan(">atan</button>
          <button type="button" class="operatorBtn" data-append="%">%</button>

          <button type="button" class="fnBtn" data-append="sqrt(">√</button>
          <button type="button" class="fnBtn" data-append="log(">log</button>
          <button type="button" class="fnBtn" data-append="ln(">ln</button>
          <button type="button" data-append="(">(</button>

          <button type="button" class="fnBtn" data-append="pi">π</button>
          <button type="button" class="fnBtn" data-append="e">e</button>
          <button type="button" data-append=")">)</button>
          <button type="button" class="operatorBtn" data-action="backspace">⌫</button>
        </div>

        <div class="keys-grid basic" role="group" aria-label="Basic keypad">
          <button type="button" class="operatorBtn" data-action="clear">C</button>
          <button type="button" data-append="7">7</button>
          <button type="button" data-append="4">4</button>
          <button type="button" data-append="1">1</button>

          <button type="button" data-append="0">0</button>
          <button type="button" data-append="8">8</button>
          <button type="button" data-append="5">5</button>
          <button type="button" data-append="2">2</button>

          <button type="button" data-append=".">.</button>
          <button type="button" data-append="9">9</button>
          <button type="button" data-append="6">6</button>
          <button type="button" data-append="3">3</button>

          <button type="button" data-append="(">(</button>
          <button type="button" data-append=")">)</button>
          <button type="button" class="operatorBtn" data-action="backspace">⌫</button>
          <button type="button" class="equalsBtn" data-action="calculate">=</button>

          <button type="button" class="operatorBtn" data-append="/">÷</button>
          <button type="button" class="operatorBtn" data-append="*">×</button>
          <button type="button" class="operatorBtn" data-append="-">−</button>
          <button type="button" class="operatorBtn" data-append="+">+</button>
        </div>
      </div>
    </main>

    <script src="index.js"></script>
  </body>
</html>
